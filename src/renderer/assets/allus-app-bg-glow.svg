<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <!-- Versão "assada" (pré-rasterizada) do fundo radial de .allus-app-bg em
       tokens.css. Existe porque o mesmo gradiente via CSS puro
       (radial-gradient empilhado) não estava compositando de forma
       confiável no build empacotado (aparecia liso/preto), mesmo com hacks
       de compositing layer (translateZ) e testes de GPU on/off — só o
       fundo sólido aparecia. Uma imagem rasteriza igual em qualquer
       contexto, então serve de fallback robusto. Se algum dia o bug de CSS
       for identificado e corrigido, este arquivo pode ser removido e o
       gradiente volta a viver só em tokens.css. -->
  <defs>
    <radialGradient id="g1" cx="15%" cy="10%" r="45%">
      <stop offset="0%" stop-color="#ecdc01" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#ecdc01" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#b8ac00" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#b8ac00" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#f5ec6b" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#f5ec6b" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="100" height="100" fill="#000001" />
  <rect width="100" height="100" fill="url(#g3)" />
  <rect width="100" height="100" fill="url(#g2)" />
  <rect width="100" height="100" fill="url(#g1)" />
</svg>
